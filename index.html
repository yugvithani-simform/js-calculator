<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        crossorigin="anonymous">
    <script type="module" src="./src/main.js" defer></script>
    <title>JS Calculator</title>
</head>

<body>
    <div class="container">
        <div class="calc">
            <div class="title">Calculator</div>
            <div class="line"></div>
            <div class="displayArea">
                <div id="previousExpression" class="previousExpression">
                    0
                </div>
                <input id="displayArea-input" type="text" readonly value="0">
            </div>
            <div class="calc-btns">
                <button class="btn operator" data-value="(">(</button>
                <button class="btn operator" data-value=")">)</button>
                <button class="btn cleaner" data-value="DEL">DEL</button>
                <button class="btn cleaner" data-value="CE">CE</button>

                <button class="btn" data-value="sin">sin</button>
                <button class="btn" data-value="cos">cos</button>
                <button class="btn" data-value="tan">tan</button>
                <button id="angleMode" class="btn" data-value="deg"><span>DEG</span><sub>/RED</sub></button>

                <button class="btn" data-value="√">√</button>
                <button class="btn" data-value="log">log</button>
                <button class="btn" data-value="ln">ln</button>
                <button class="btn" data-value="INV">1/x</button>

                <button class="btn" data-value="π">π</button>
                <button class="btn" data-value="e">e</button>
                <button class="btn" data-value="^">x<sup>y</sup></button>
                <button class="btn " data-value="!">n!</button>

                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-value="%">%</button>

                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-value="+">+</button>

                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn operator" data-value="-">-</button>

                <button class="btn number"  style="background-color: rgb(189, 189, 189)" data-value="plus-minus">+/-</button>
                <button class="btn number" data-value="0">0</button>
                <button class="btn number"  style="background-color: rgb(189, 189, 189)" data-value=".">.</button>
                <button class="btn operator" data-value="*">*</button>

                <button class="btn" style="grid-column: 1/3; background-color: rgb(0, 201, 0);" data-value="=">=</button>
                <button class="btn" data-value="Ans">Ans</button>
                <button class="btn operator" data-value="/">/</button>
            </div>
        </div>
    </div>
</body>

</html>
