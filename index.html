<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        crossorigin="anonymous">
    <title>JS Calculator</title>
</head>

<body>
    <div class="container">
        <div class="calc">
            <div class="title">Calculator</div>
            <div class="line"></div>
            <div class="display-area">
                <div class="expression">
                    exp
                </div>
                <input type="text">                  
                </input>
            </div>
            <div class="calc-btns">
                <button class="btn operator">(</button>
                <button class="btn operator">)</button>
                <button class="btn cleaner">DEL</button>
                <button class="btn cleaner">CE</button>

                <button class="btn">sin</button>
                <button class="btn">cos</button>
                <button class="btn">tan</button>
                <button class="btn"><span>Deg</span><sub>/Red</sub></button>

                <button class="btn">√</button>
                <button class="btn">log</button>
                <button class="btn">ln</button>
                <button class="btn">1/x</button>

                <button class="btn">π</button>
                <button class="btn">e</button>
                <button class="btn">x<sup>y</sup></button>
                <button class="btn ">n!</button>

                <button class="btn number">7</button>
                <button class="btn number">8</button>
                <button class="btn number">9</button>
                <button class="btn operator">%</button>

                <button class="btn number">4</button>
                <button class="btn number">5</button>
                <button class="btn number">6</button>
                <button class="btn operator">+</button>

                <button class="btn number">1</button>
                <button class="btn number">2</button>
                <button class="btn number">3</button>
                <button class="btn operator">-</button>

                <button class="btn number"  style="background-color: rgb(189, 189, 189)">+/-</button>
                <button class="btn number">0</button>
                <button class="btn number"  style="background-color: rgb(189, 189, 189)">.</button>
                <button class="btn operator">*</button>

                <button class="btn" style="grid-column: 1/3; background-color: rgb(0, 201, 0);">=</button>
                <button class="btn">Ans</button>
                <button class="btn operator">/</button>
            </div>
        </div>
    </div>
</body>

</html>
